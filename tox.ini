[tox]
envlist = lint
skipsdist = true

[testenv:lint]
description = Lint Ansible and Terraform code in the repo
basepython = python3
skip_install = true
passenv =
    HOME
deps =
    ansible-core==2.19.1
    ansible-lint==26.4.0
allowlist_externals =
    bash
    terraform
commands =
    ansible-lint playbooks
    terraform fmt -check -recursive terraform
    bash -ec 'find terraform -type f -name "*.tf" -printf "%h\n" | sort -u | while read -r dir; do echo "==> terraform init -backend=false in ${dir}"; terraform -chdir="$dir" init -backend=false -input=false >/dev/null; echo "==> terraform validate in ${dir}"; terraform -chdir="$dir" validate; done'
