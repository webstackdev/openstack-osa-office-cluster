---
ansible_user: kevin
ansible_ssh_private_key_file: /home/kevin/.ssh/id_ed25519
ansible_python_interpreter: /usr/bin/python3

# NTP
ntp_servers:
  - 0.ubuntu.pool.ntp.org
  - 1.ubuntu.pool.ntp.org

# Network CIDRs
mgmt_cidr: 192.168.50.0/24
overlay_cidr: 192.168.60.0/24
storage_cidr: 192.168.70.0/24
provider_cidr: 192.168.2.0/24

# DNS
dns_servers:
  - 192.168.50.1

# Common packages for all OpenStack hosts
openstack_host_packages:
  - bridge-utils
  - debootstrap
  - openssh-server
  - tcpdump
  - vlan
  - python3
  - python3-dev
  - lvm2
  - ntp
  - ntpdate
  - build-essential

# Kernel modules required by OSA/OVS
openstack_kernel_modules:
  - br_netfilter
  - 8021q
  - bonding
  - openvswitch

# Registry TLS (Let's Encrypt via Porkbun DNS-01)
# Add vault_registry_acme_email, vault_registry_porkbun_api_key, and
# vault_registry_porkbun_secret_api_key to the Ansible vault.
registry_acme_email: "{{ vault_registry_acme_email }}"
registry_porkbun_api_key: "{{ vault_registry_porkbun_api_key }}"
registry_porkbun_secret_api_key: "{{ vault_registry_porkbun_secret_api_key }}"
