---
server_name: cloud-celeron.local
short_hostname: cloud-celeron

# Network interfaces
mgmt_interface: enp12s0
mgmt_ip: 192.168.50.178
overlay_interface: enp6s0
overlay_ip: 192.168.60.11
storage_interface: enp11s0
storage_ip: 192.168.70.11
provider_interface: enp7s0

# Default gateway (management network router)
mgmt_gateway: 192.168.50.1

# Node roles
is_controller: false
is_compute: true

# Storage - Nova ephemeral
ephemeral_device: /dev/sda
ephemeral_mount: /var/lib/nova/instances

# Host-level OpenStack service log directories
# neutron-ovn-metadata-agent and ceilometer-polling run on the host (not in LXC)
host_openstack_log_dirs:
  - { dir: ceilometer, owner: ceilometer }
  - { dir: neutron, owner: neutron }
