---
server_name: cloud-4core.local
short_hostname: cloud-4core

# Network interfaces
mgmt_interface: enp12s0
mgmt_ip: 192.168.50.168
overlay_interface: enp6s0
overlay_ip: 192.168.60.12
storage_interface: enp11s0
storage_ip: 192.168.70.12
provider_interface: enp7s0

# Default gateway (management network router)
mgmt_gateway: 192.168.50.1

# Node roles
is_controller: true
is_compute: false

# Storage - Glance image store
glance_device: /dev/sda
glance_mount: /var/lib/glance/images
