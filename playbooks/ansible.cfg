[defaults]
# Specify the inventory file
inventory = inventory/hosts.yml

# Define the roles path
roles_path = roles

# Define the directory for host and group variables
host_vars_inventory = inventory/host_vars
group_vars_inventory = inventory/group_vars

# Set the logging verbosity level
verbosity = 2

# Set the log file path (local directory)
log_path = ./ansible.log

# Define the default become method
become_method = sudo

# Use a local password file for Vault to avoid typing the password in on each invocation
vault_password_file = ~/.ansible.pass

# Quiet deprecation warnings
deprecation_warnings = False

# Set a custom collections path (singular form is correct for ansible.cfg)
collections_path = /home/kevin/Repos/home-cloud/collections:~/.ansible/collections:/usr/share/ansible/collections

[persistent_connection]
# Controls how long the persistent connection will remain idle before it is destroyed
connect_timeout=30

# Controls the amount of time to wait for response from remote device before timing out persistent connection
command_timeout=30
