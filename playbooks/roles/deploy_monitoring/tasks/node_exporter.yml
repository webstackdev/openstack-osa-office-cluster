---
- name: Check if node_exporter is already installed at target version
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: deploy_monitoring_node_exporter_bin

- name: Get installed node_exporter version
  ansible.builtin.command: /usr/local/bin/node_exporter --version
  register: deploy_monitoring_node_exporter_installed_version
  changed_when: false
  failed_when: false
  when: deploy_monitoring_node_exporter_bin.stat.exists

- name: Download node_exporter
  ansible.builtin.get_url:
    url: >-
      {{
        "https://github.com/prometheus/node_exporter/releases/download/v"
        ~ deploy_monitoring_node_exporter_version
        ~ "/node_exporter-"
        ~ deploy_monitoring_node_exporter_version
        ~ ".linux-"
        ~ deploy_monitoring_arch
        ~ ".tar.gz"
      }}
    dest: "/tmp/node_exporter-{{ deploy_monitoring_node_exporter_version }}.tar.gz"
    mode: "0644"
  when: >
    not deploy_monitoring_node_exporter_bin.stat.exists or
    deploy_monitoring_node_exporter_version not in (deploy_monitoring_node_exporter_installed_version.stderr | default(''))

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ deploy_monitoring_node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: >
    not deploy_monitoring_node_exporter_bin.stat.exists or
    deploy_monitoring_node_exporter_version not in (deploy_monitoring_node_exporter_installed_version.stderr | default(''))

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ deploy_monitoring_node_exporter_version }}.linux-{{ deploy_monitoring_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  when: >
    not deploy_monitoring_node_exporter_bin.stat.exists or
    deploy_monitoring_node_exporter_version not in (deploy_monitoring_node_exporter_installed_version.stderr | default(''))
  notify: Restart node_exporter

- name: Create node_exporter system user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Deploy node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
