---
- name: Check if promtail is already installed at target version
  ansible.builtin.stat:
    path: /usr/local/bin/promtail
  register: promtail_bin

- name: Get installed promtail version
  ansible.builtin.command: /usr/local/bin/promtail --version
  register: promtail_installed_version
  changed_when: false
  failed_when: false
  when: promtail_bin.stat.exists

- name: Download promtail
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-{{ monitoring_arch }}.zip"
    dest: "/tmp/promtail-{{ promtail_version }}.zip"
    mode: "0644"
  when: >
    not promtail_bin.stat.exists or
    promtail_version not in (promtail_installed_version.stdout | default(''))

- name: Install unzip for promtail extraction
  ansible.builtin.apt:
    name: unzip
    state: present

- name: Extract promtail
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ promtail_version }}.zip"
    dest: /tmp
    remote_src: true
  when: >
    not promtail_bin.stat.exists or
    promtail_version not in (promtail_installed_version.stdout | default(''))

- name: Install promtail binary
  ansible.builtin.copy:
    src: /tmp/promtail-linux-{{ monitoring_arch }}
    dest: /usr/local/bin/promtail
    mode: "0755"
    remote_src: true
  notify: restart promtail

- name: Create promtail system user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: adm,systemd-journal
    append: true

- name: Create promtail config directory
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    mode: "0755"

- name: Create promtail positions directory
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"

- name: Deploy promtail config
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/promtail.yml
    mode: "0644"
  notify: restart promtail

- name: Deploy promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify: restart promtail

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
