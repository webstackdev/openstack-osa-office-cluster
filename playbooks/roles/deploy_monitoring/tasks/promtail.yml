---
- name: Check if promtail is already installed at target version
  ansible.builtin.stat:
    path: /usr/local/bin/promtail
  register: deploy_monitoring_promtail_bin

- name: Get installed promtail version
  ansible.builtin.command: /usr/local/bin/promtail --version
  register: deploy_monitoring_promtail_installed_version
  changed_when: false
  failed_when: false
  when: deploy_monitoring_promtail_bin.stat.exists

- name: Download promtail
  ansible.builtin.get_url:
    url: >-
      https://github.com/grafana/loki/releases/download/v{{ deploy_monitoring_promtail_version }}/promtail-linux-{{ deploy_monitoring_arch }}.zip
    dest: "/tmp/promtail-{{ deploy_monitoring_promtail_version }}.zip"
    mode: "0644"
  when: >
    not deploy_monitoring_promtail_bin.stat.exists or
    deploy_monitoring_promtail_version not in (deploy_monitoring_promtail_installed_version.stdout | default(''))

- name: Install unzip for promtail extraction
  ansible.builtin.apt:
    name: unzip
    state: present

- name: Extract promtail
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ deploy_monitoring_promtail_version }}.zip"
    dest: /tmp
    remote_src: true
  when: >
    not deploy_monitoring_promtail_bin.stat.exists or
    deploy_monitoring_promtail_version not in (deploy_monitoring_promtail_installed_version.stdout | default(''))

- name: Install promtail binary
  ansible.builtin.copy:
    src: /tmp/promtail-linux-{{ deploy_monitoring_arch }}
    dest: /usr/local/bin/promtail
    mode: "0755"
    remote_src: true
  when: >
    not deploy_monitoring_promtail_bin.stat.exists or
    deploy_monitoring_promtail_version not in (deploy_monitoring_promtail_installed_version.stdout | default(''))
  notify: Restart promtail

- name: Create promtail system user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: adm,systemd-journal
    append: true

- name: Create promtail config directory
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    mode: "0755"

- name: Create promtail positions directory
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"

- name: Grant promtail access to Docker container logs
  when: is_controller | default(false)
  block:
    - name: Install acl package for setfacl
      ansible.builtin.apt:
        name: acl
        state: present

    - name: Set ACL on Docker data directory for promtail traversal
      ansible.posix.acl:
        path: /var/lib/docker
        entity: promtail
        etype: user
        permissions: x
        state: present

    - name: Set ACL on Docker containers directory for promtail
      ansible.posix.acl:
        path: /var/lib/docker/containers
        entity: promtail
        etype: user
        permissions: rX
        recursive: true
        state: present

    - name: Set default ACL on Docker containers directory for promtail
      ansible.posix.acl:
        path: /var/lib/docker/containers
        entity: promtail
        etype: user
        permissions: rX
        default: true
        state: present

- name: Deploy promtail config
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/promtail.yml
    mode: "0644"
  notify: Restart promtail

- name: Deploy promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify: Restart promtail

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true
