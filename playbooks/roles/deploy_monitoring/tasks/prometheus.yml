---
- name: Check if prometheus is already installed at target version
  ansible.builtin.stat:
    path: /usr/local/bin/prometheus
  register: deploy_monitoring_prometheus_bin

- name: Get installed prometheus version
  ansible.builtin.command: /usr/local/bin/prometheus --version
  register: deploy_monitoring_prometheus_installed_version
  changed_when: false
  failed_when: false
  when: deploy_monitoring_prometheus_bin.stat.exists

- name: Download prometheus
  ansible.builtin.get_url:
    url: >-
      {{
        "https://github.com/prometheus/prometheus/releases/download/v"
        ~ deploy_monitoring_prometheus_version
        ~ "/prometheus-" ~ deploy_monitoring_prometheus_version
        ~ ".linux-" ~ deploy_monitoring_arch ~ ".tar.gz"
      }}
    dest: "/tmp/prometheus-{{ deploy_monitoring_prometheus_version }}.tar.gz"
    mode: "0644"
  when: >
    not deploy_monitoring_prometheus_bin.stat.exists or
    deploy_monitoring_prometheus_version not in (deploy_monitoring_prometheus_installed_version.stdout | default(''))

- name: Extract prometheus
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ deploy_monitoring_prometheus_version }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: >
    not deploy_monitoring_prometheus_bin.stat.exists or
    deploy_monitoring_prometheus_version not in (deploy_monitoring_prometheus_installed_version.stdout | default(''))

- name: Install prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ deploy_monitoring_prometheus_version }}.linux-{{ deploy_monitoring_arch }}/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool
  notify: Restart prometheus

- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create prometheus data directory
  ansible.builtin.file:
    path: "{{ deploy_monitoring_prometheus_data_dir }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"

- name: Create prometheus config directory
  ansible.builtin.file:
    path: /etc/prometheus
    state: directory
    mode: "0755"

- name: Deploy prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: "0644"
  notify: Restart prometheus

- name: Deploy prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify: Restart prometheus

- name: Enable and start prometheus
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
    daemon_reload: true
