---
- name: Download Grafana deb to deployment host
  ansible.builtin.get_url:
    url: >-
      https://dl.grafana.com/oss/release/grafana_{{
      deploy_monitoring_grafana_version }}_{{ deploy_monitoring_arch }}.deb
    dest: "/tmp/grafana_{{ deploy_monitoring_grafana_version }}_{{ deploy_monitoring_arch }}.deb"
    mode: "0644"
  delegate_to: localhost
  become: false
  run_once: true

- name: Copy Grafana deb to target
  ansible.builtin.copy:
    src: "/tmp/grafana_{{ deploy_monitoring_grafana_version }}_{{ deploy_monitoring_arch }}.deb"
    dest: "/tmp/grafana_{{ deploy_monitoring_grafana_version }}_{{ deploy_monitoring_arch }}.deb"
    mode: "0644"

- name: Install Grafana from deb
  ansible.builtin.apt:
    deb: "/tmp/grafana_{{ deploy_monitoring_grafana_version }}_{{ deploy_monitoring_arch }}.deb"
    state: present

- name: Configure Grafana listen address
  ansible.builtin.lineinfile:
    path: /etc/grafana/grafana.ini
    regexp: '^;?http_addr\s*='
    line: "http_addr = {{ deploy_monitoring_grafana_listen_address }}"
    insertafter: '^\[server\]'
  notify: Restart grafana

- name: Configure Grafana listen port
  ansible.builtin.lineinfile:
    path: /etc/grafana/grafana.ini
    regexp: '^;?http_port\s*='
    line: "http_port = {{ deploy_monitoring_grafana_http_port }}"
    insertafter: '^\[server\]'
  notify: Restart grafana

- name: Create Grafana provisioning datasources directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Deploy Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana_datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/home-cloud.yml
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Create Grafana provisioning dashboards directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Deploy Grafana dashboard provider
  ansible.builtin.template:
    src: grafana_dashboard_provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/home-cloud.yml
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Create Grafana dashboards directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Deploy Grafana dashboards
  ansible.builtin.copy:
    src: "grafana_dashboards/{{ item }}"
    dest: "/var/lib/grafana/dashboards/{{ item }}"
    owner: grafana
    group: grafana
    mode: "0640"
  loop:
    - node_overview.json
    - openstack_logs.json
    - openstack_ops.json
    - ceilometer_gnocchi.json
  notify: Restart grafana

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started
    daemon_reload: true
