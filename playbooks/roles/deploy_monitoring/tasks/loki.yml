---
- name: Check if loki is already installed at target version
  ansible.builtin.stat:
    path: /usr/local/bin/loki
  register: deploy_monitoring_loki_bin

- name: Get installed loki version
  ansible.builtin.command: /usr/local/bin/loki --version
  register: deploy_monitoring_loki_installed_version
  changed_when: false
  failed_when: false
  when: deploy_monitoring_loki_bin.stat.exists

- name: Download loki
  ansible.builtin.get_url:
    url: >-
      https://github.com/grafana/loki/releases/download/v{{ deploy_monitoring_loki_version }}/loki-linux-{{ deploy_monitoring_arch }}.zip
    dest: "/tmp/loki-{{ deploy_monitoring_loki_version }}.zip"
    mode: "0644"
  when: >
    not deploy_monitoring_loki_bin.stat.exists or
    deploy_monitoring_loki_version not in (deploy_monitoring_loki_installed_version.stdout | default(''))

- name: Extract loki
  ansible.builtin.unarchive:
    src: "/tmp/loki-{{ deploy_monitoring_loki_version }}.zip"
    dest: /tmp
    remote_src: true
  when: >
    not deploy_monitoring_loki_bin.stat.exists or
    deploy_monitoring_loki_version not in (deploy_monitoring_loki_installed_version.stdout | default(''))

- name: Install loki binary
  ansible.builtin.copy:
    src: /tmp/loki-linux-{{ deploy_monitoring_arch }}
    dest: /usr/local/bin/loki
    mode: "0755"
    remote_src: true
  when: >
    not deploy_monitoring_loki_bin.stat.exists or
    deploy_monitoring_loki_version not in (deploy_monitoring_loki_installed_version.stdout | default(''))
  notify: Restart loki

- name: Create loki system user
  ansible.builtin.user:
    name: loki
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create loki data directory
  ansible.builtin.file:
    path: "{{ deploy_monitoring_loki_data_dir }}"
    state: directory
    owner: loki
    group: loki
    mode: "0755"

- name: Create loki config directory
  ansible.builtin.file:
    path: /etc/loki
    state: directory
    mode: "0755"

- name: Deploy loki config
  ansible.builtin.template:
    src: loki.yml.j2
    dest: /etc/loki/loki.yml
    mode: "0644"
  notify: Restart loki

- name: Deploy loki systemd unit
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify: Restart loki

- name: Enable and start loki
  ansible.builtin.systemd:
    name: loki
    enabled: true
    state: started
    daemon_reload: true
