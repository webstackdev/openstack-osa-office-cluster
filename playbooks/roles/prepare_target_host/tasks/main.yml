---
- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name: "{{ openstack_host_packages }}"
    state: present

- name: Install linux-modules-extra for running kernel
  ansible.builtin.apt:
    name: "linux-modules-extra-{{ ansible_facts['kernel'] }}"
    state: present

- name: Load kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ openstack_kernel_modules }}"

- name: Persist kernel modules across reboots
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/openstack.conf
    line: "{{ item }}"
    create: true
    mode: "0644"
  loop: "{{ openstack_kernel_modules }}"

- name: Configure sysctl for IP forwarding and bridge netfilter
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: net.ipv4.ip_forward, value: "1" }
    - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }

- name: Set hostname to short name
  ansible.builtin.hostname:
    name: "{{ short_hostname }}"

- name: Remove 127.0.1.1 entries from /etc/hosts (OSA requirement)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    state: absent

- name: Ensure all cloud nodes are in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item }}"
    state: present
  loop:
    - "192.168.50.168 cloud-4core"
    - "192.168.50.171 cloud-6core"
    - "192.168.50.178 cloud-celeron"
    - "192.168.50.234 cloud-eugene"

- name: Configure SSH client to skip cert verification for internal IPs
  ansible.builtin.template:
    src: ssh_client_openstack.conf.j2
    dest: /etc/ssh/ssh_config.d/99-openstack-internal.conf
    mode: "0644"

- name: Ensure SSH trusted CA directory exists
  ansible.builtin.file:
    path: /etc/ssh/trusted_ca.d
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install user CA into trusted_ca.d for OSA coexistence
  ansible.builtin.copy:
    src: /etc/ssh/user_ca.pub
    dest: /etc/ssh/trusted_ca.d/user_ca
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  notify: Reassemble trusted_ca

- name: Ensure SSH authorized principals directory exists
  ansible.builtin.file:
    path: /etc/ssh/auth_principals
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create kevin SSH certificate principals file
  ansible.builtin.copy:
    content: "kevin\n"
    dest: /etc/ssh/auth_principals/kevin_principals
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd

- name: Configure ntpsec NTP
  ansible.builtin.template:
    src: ntp.conf.j2
    dest: /etc/ntpsec/ntp.conf
    mode: "0644"
  notify: Restart ntpsec

- name: Enable and start ntpsec
  ansible.builtin.systemd:
    name: ntpsec
    enabled: true
    state: started

- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if required
  ansible.builtin.reboot:
    msg: "Rebooting after kernel upgrade / module changes"
    reboot_timeout: 300
  when: reboot_required.stat.exists
