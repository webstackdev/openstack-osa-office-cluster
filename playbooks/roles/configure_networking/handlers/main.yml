---
- name: Reload NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    state: reloaded

- name: Enable octavia-veth-bridge service
  ansible.builtin.systemd:
    name: octavia-veth-bridge.service
    enabled: true
    daemon_reload: true
    state: started

- name: Enable provider-bridge-eth12 service
  ansible.builtin.systemd:
    name: provider-bridge-eth12.service
    enabled: true
    daemon_reload: true
    state: started

- name: Enable lxc-veth-rewire service
  ansible.builtin.systemd:
    name: lxc-veth-rewire.service
    enabled: true
    daemon_reload: true
    state: started
