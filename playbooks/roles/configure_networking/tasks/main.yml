---
- name: Backup existing netplan configuration
  ansible.builtin.shell: |
    cp /etc/netplan/*.yaml /etc/netplan/backup/ 2>/dev/null || true
  args:
    creates: /etc/netplan/backup/

- name: Create netplan backup directory
  ansible.builtin.file:
    path: /etc/netplan/backup
    state: directory
    mode: "0755"

- name: Remove default netplan configs (will be replaced by bridge config)
  ansible.builtin.shell: |
    mv /etc/netplan/0*.yaml /etc/netplan/backup/ 2>/dev/null || true
    mv /etc/netplan/5*.yaml /etc/netplan/backup/ 2>/dev/null || true
  changed_when: false

- name: Deploy OpenStack bridge netplan configuration
  ansible.builtin.template:
    src: netplan-bridges.yaml.j2
    dest: /etc/netplan/60-openstack-bridges.yaml
    mode: "0600"
  register: netplan_config

- name: Apply netplan configuration
  ansible.builtin.command: netplan apply
  when: netplan_config.changed
  async: 45
  poll: 0
  register: netplan_apply

- name: Wait for network connectivity to restore
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: 60
  when: netplan_config.changed

- name: Verify all bridges exist
  ansible.builtin.command: "ip link show {{ item }}"
  loop:
    - br-mgmt
    - br-vxlan
    - br-storage
    - br-vlan
  changed_when: false
