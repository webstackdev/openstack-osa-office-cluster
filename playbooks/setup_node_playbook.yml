---
- name: Setup OpenStack Node
  hosts: all
  remote_user: kevin
  become: true

  roles:
    - webstack_builders.openstack_new_node.install_packages

  vars:
    # Update cache before installation
    install_packages_update_cache: true

    # Perform full system upgrade
    install_packages_dist_upgrade: true

    # Install kernel extras
    install_packages_kernel_extras: true

    # Reboot after installation if needed
    # WARNING: This will reboot the system!
    install_packages_reboot: false

    # Full package list for OpenStack nodes
    install_packages_list:
      - bridge-utils
      - debootstrap
      - openssh-server
      - tcpdump
      - vlan
      - python3
