---
# Phase 4: Run OSA deployment
#
# Runs the three main OSA playbooks in sequence.
# This will take several hours. Each stage can be run independently
# by commenting out the others if resuming after a failure.
#
# Usage: ansible-playbook playbooks/run_osa_deploy.yml
#
# To run individual stages manually:
#   cd /opt/openstack-ansible/playbooks
#   openstack-ansible openstack.osa.setup_hosts
#   openstack-ansible openstack.osa.setup_infrastructure
#   openstack-ansible openstack.osa.setup_openstack

- name: Run OpenStack-Ansible deployment
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  vars:
    osa_base_dir: /opt/openstack-ansible

  tasks:
    - name: "Stage 1/3: Setup hosts (LXC containers, host config)"
      ansible.builtin.command: >
        openstack-ansible openstack.osa.setup_hosts
      args:
        chdir: "{{ osa_base_dir }}/playbooks"
      changed_when: true

    - name: "Stage 2/3: Setup infrastructure (galera, rabbitmq, memcached, repo)"
      ansible.builtin.command: >
        openstack-ansible openstack.osa.setup_infrastructure
      args:
        chdir: "{{ osa_base_dir }}/playbooks"
      changed_when: true

    - name: Verify galera cluster health
      ansible.builtin.command: >
        ansible galera_container -m shell
        -a "mariadb -h localhost -e 'show status like \"%wsrep_cluster_%\";'"
      args:
        chdir: "{{ osa_base_dir }}/playbooks"
      register: galera_check
      changed_when: false

    - name: Display galera cluster status
      ansible.builtin.debug:
        var: galera_check.stdout_lines

    - name: "Stage 3/3: Setup OpenStack (keystone, glance, cinder, nova, neutron, horizon, swift)"
      ansible.builtin.command: >
        openstack-ansible openstack.osa.setup_openstack
      args:
        chdir: "{{ osa_base_dir }}/playbooks"
      changed_when: true

# OSA's lxc_hosts role masks lxc-net and relies on systemd-networkd to create
# lxcbr0. Since our nodes use NetworkManager (not systemd-networkd), lxcbr0 is
# never created at boot and all LXC containers lose network connectivity.
# This post-deploy play undoes the masking and fixes the LXC_NETWORK format
# (OSA's template expands to netmask notation but nftables requires CIDR).
- name: Fix LXC networking for NetworkManager hosts
  hosts: controllers
  become: true
  gather_facts: false

  tasks:
    - name: Unmask and enable lxc-net service
      ansible.builtin.systemd:
        name: lxc-net
        masked: false
        enabled: true
        state: started

    - name: Fix LXC_NETWORK to use CIDR notation in /etc/default/lxc-net
      ansible.builtin.lineinfile:
        path: /etc/default/lxc-net
        regexp: '^LXC_NETWORK='
        line: 'LXC_NETWORK="10.0.3.0/24"'
