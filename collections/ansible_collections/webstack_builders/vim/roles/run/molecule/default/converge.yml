---
- name: Converge
  hosts: all
  gather_facts: false
  tasks:
    - name: Create test user
      ansible.builtin.user:
        name: testuser
        groups: sudo
        append: true
        shell: /bin/bash
        create_home: true

    - name: Add testuser to sudo group
      ansible.builtin.user:
        name: testuser
        groups: sudo
        append: true

    - name: Allow testuser to sudo without password
      ansible.builtin.copy:
        content: "testuser ALL=(ALL) NOPASSWD:ALL\n"
        dest: /etc/sudoers.d/testuser
        mode: "0440"
        validate: "visudo -cf %s"

- name: Configure vim for test user
  hosts: all
  gather_facts: true
  tasks:
    - name: Include vim role
      ansible.builtin.include_role:
        name: webstack_builders.vim.run
      vars:
        ansible_user: testuser
        vim_dir: /home/testuser/.vim
        vim_rc: /home/testuser/.vimrc
