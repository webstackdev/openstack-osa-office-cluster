---
- name: Verify
  hosts: localhost
  become: true
  gather_facts: true
  vars:
    test_user: testuser
    vim_dir: "/home/testuser/.vim"
    vim_rc: "/home/testuser/.vimrc"
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Verify vim packages are installed
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      check_mode: true
      register: package_check
      failed_when: package_check.changed
      loop:
        - vim-nox
        - git
        - fonts-powerline
        - fzf

    - name: Verify vim directory structure exists
      ansible.builtin.stat:
        path: "{{ item }}"
      register: dir_check
      failed_when: not dir_check.stat.exists or not dir_check.stat.isdir
      loop:
        - "{{ vim_dir }}"
        - "{{ vim_dir }}/autoload"
        - "{{ vim_dir }}/bundle"

    - name: Verify pathogen.vim is present
      ansible.builtin.stat:
        path: "{{ vim_dir }}/autoload/pathogen.vim"
      register: pathogen_check
      failed_when: not pathogen_check.stat.exists

    - name: Verify pathogen.vim contains expected content
      ansible.builtin.shell: |
        head -5 "{{ vim_dir }}/autoload/pathogen.vim" | grep -q "pathogen.vim"
      register: pathogen_content_check
      failed_when: pathogen_content_check.rc != 0
      changed_when: false

    - name: Verify plugins are installed
      ansible.builtin.stat:
        path: "{{ vim_dir }}/bundle/{{ item }}"
      register: plugin_check
      failed_when: not plugin_check.stat.exists or not plugin_check.stat.isdir
      loop:
        - vim-airline
        - nerdtree

    - name: Configure git safe directories for plugins
      ansible.builtin.command:
        cmd: git config --global --add safe.directory "{{ vim_dir }}/bundle/{{ item }}"
      become: true
      become_user: testuser
      loop:
        - vim-airline
        - nerdtree

    - name: Verify plugin git repositories are valid
      ansible.builtin.shell:
        cmd: cd "{{ vim_dir }}/bundle/{{ item }}" && git status
      become: true
      become_user: testuser
      register: git_check
      failed_when: git_check.rc != 0
      loop:
        - vim-airline
        - nerdtree

    - name: Verify .vimrc file exists
      ansible.builtin.stat:
        path: "{{ vim_rc }}"
      register: vimrc_check
      failed_when: not vimrc_check.stat.exists

    - name: Verify .vimrc contains pathogen execute
      ansible.builtin.shell: |
        grep -q "execute pathogen#infect()" "{{ vim_rc }}"
      register: vimrc_pathogen_check
      failed_when: vimrc_pathogen_check.rc != 0
      changed_when: false

    - name: Test vim configuration syntax is valid
      ansible.builtin.shell:
        cmd: sudo -u testuser vim -u "{{ vim_rc }}" -T dumb -n -e -s -c "qa" < /dev/null
      register: vim_test
      failed_when: vim_test.rc > 1  # Allow exit code 1 but fail on 2+ (syntax errors)
      changed_when: false

    - name: Verify vim executable is accessible
      ansible.builtin.command:
        cmd: which vim
      register: vim_which
      failed_when: vim_which.rc != 0
      changed_when: false

    - name: Verify file ownership is correct
      ansible.builtin.stat:
        path: "{{ vim_dir }}"
      register: ownership_check
      failed_when: ownership_check.stat.pw_name != test_user

    - name: Verify directory permissions
      ansible.builtin.stat:
        path: "{{ vim_dir }}"
      register: perm_check
      failed_when: perm_check.stat.mode != "0750"

    - name: Verify plugin directories contain vim scripts
      ansible.builtin.find:
        paths: "{{ vim_dir }}/bundle/{{ item }}"
        patterns: "*.vim"
        recurse: true
      register: plugin_files
      failed_when: plugin_files.files | length == 0
      loop:
        - vim-airline
        - nerdtree

    - name: Final verification summary
      ansible.builtin.debug:
        msg: |
          🎉 VIM ROLE MOLECULE VERIFICATION COMPLETED SUCCESSFULLY! 🎉

          ✅ All required packages installed
          ✅ Vim directory structure created  
          ✅ Pathogen plugin manager installed
          ✅ Git repositories cloned for plugins
          ✅ Configuration files deployed
          ✅ File permissions and ownership correct
          ✅ Plugin files present and valid

          The vim role has been successfully tested with Molecule! 🚀