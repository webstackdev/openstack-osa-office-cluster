---
argument_specs:
  main:
    short_description: Configure and install vim with plugins using pathogen.
    description:
      - This role installs vim and required packages
      - Sets up vim configuration directory structure
      - Installs pathogen plugin manager
      - Downloads and installs specified vim plugins
      - Deploys custom vimrc configuration
    options:
      vim_plugins:
        type: list
        description: List of vim plugins to install via git repositories.
        default:
          - name: vim-airline
            url: https://github.com/vim-airline/vim-airline
          - name: nerdtree
            url: https://github.com/preservim/nerdtree
          - name: fzf-vim
            url: https://github.com/junegunn/fzf.vim
          - name: vim-gitgutter
            url: https://github.com/airblade/vim-gitgutter
          - name: vim-fugitive
            url: https://github.com/tpope/vim-fugitive
        elements: dict
        options:
          name:
            type: str
            required: true
            description: Name of the vim plugin (used as directory name).
          url:
            type: str
            required: true
            description: Git repository URL for the plugin.
      vim_dir:
        type: path
        description: Directory where vim configuration and plugins will be stored.
        default: "{{ lookup('env', 'HOME') }}/.vim"
      vim_rc:
        type: path
        description: Path to the vimrc configuration file.
        default: "{{ lookup('env', 'HOME') }}/.vimrc"
      vim_install_packages:
        type: list
        description: List of system packages required for vim functionality.
        default:
          - vim-nox
          - git
          - fonts-powerline
          - fzf
        elements: str
