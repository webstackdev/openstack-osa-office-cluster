---
# tasks file for vim
- name: Validate vim role arguments
  ansible.builtin.include_tasks: validate.yml
  tags:
    - validation
    - vim_validation

- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name: "{{ vim_install_packages }}"
    state: present
  become: true
  tags:
    - install_packages

- name: Ensure .vim/{autoload,bundle} directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: false
    mode: "0750"
  loop:
    - "{{ vim_dir }}"
    - "{{ vim_dir }}/autoload"
    - "{{ vim_dir }}/bundle"
  check_mode: false

- name: Ensure Pathogen is in place
  ansible.builtin.get_url:
    dest: "{{ vim_dir }}/autoload/pathogen.vim"
    url: https://tpo.pe/pathogen.vim
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"

- name: Deploy plugins
  ansible.builtin.git:
    dest: "{{ vim_dir }}/bundle/{{ item.name }}"
    repo: "{{ item.url }}"
    clone: true
    update: true
    recursive: false
  loop: "{{ vim_plugins }}"
  become: true
  become_user: "{{ ansible_user }}"
  # noqa: latest

- name: Ensure .vimrc config in place
  ansible.builtin.copy:
    src: vimrc
    dest: "{{ vim_rc }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    backup: true
    mode: "0640"
