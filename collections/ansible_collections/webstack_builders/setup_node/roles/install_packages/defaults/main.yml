---
# defaults file for webstack_builders.setup_node.install_packages

# Whether to update apt cache
install_packages_update_cache: true

# Cache valid time in seconds (1 hour)
install_packages_cache_valid_time: 3600

# Whether to perform dist-upgrade
install_packages_dist_upgrade: true

# Whether to autoremove unused packages after upgrade
install_packages_autoremove: true

# List of packages to install for OpenStack node
install_packages_list:
  - bridge-utils
  - debootstrap
  - openssh-server
  - tcpdump
  - vlan
  - python3

# Whether to install kernel extra modules
install_packages_kernel_extras: true

# Whether to reboot after installation (if needed)
install_packages_reboot: false

# Reboot timeout in seconds
install_packages_reboot_timeout: 600
